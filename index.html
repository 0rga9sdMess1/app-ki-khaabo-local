    .card {
      background: rgba(255,255,255,0.75);
      border-radius: 22px;
      padding: 20px;
      margin-top: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      backdrop-filter: blur(6px);
    }

    .section-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 14px 18px;
      background: #ffb36b;
      color: #3d2c1e;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
      flex: 1;
      min-width: 120px;
      font-weight: bold;
    }

    button:hover {
      transform: scale(1.03);
    }

    .selected {
      background: #ff7a00 !important;
      color: white;
    }

    .recommendation {
      background: white;
      border-radius: 18px;
      padding: 18px;
      margin-top: 15px;
      border-left: 6px solid #ff8f2d;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .meal-name {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .meal-reason {
      line-height: 1.6;
      opacity: 0.9;
    }

    .footer-left {
      position: fixed;
      bottom: 10px;
      left: 15px;
      font-size: 12px;
      opacity: 0.7;
    }

    .footer-right {
      position: fixed;
      bottom: 10px;
      right: 15px;
      font-size: 12px;
      opacity: 0.7;
    }

    .generate-btn {
      width: 100%;
      margin-top: 20px;
      background: #ff7a00;
      color: white;
      font-size: 18px;
      padding: 16px;
    }

    .emoji {
      font-size: 24px;
      margin-right: 8px;
    }

  </style>
</head>

<body>

<div class="container">

  <div class="title">Ki Khaabo?</div>

  <div class="subtitle">
    Tonight’s dinner companion 🍲<br>
    Thoughtfully balancing comfort, health, leftovers and real life.
  </div>

  <div class="card">
    <div class="section-title">Who’s checking dinner tonight?</div>

    <div class="button-group">
      <button onclick="selectUser(this, 'Pranab')">Pranab</button>
      <button onclick="selectUser(this, 'Koyel')">Koyel</button>
    </div>
  </div>

  <div class="card">
    <div class="section-title">How’s today feeling?</div>

    <div class="button-group">
      <button onclick="selectMood(this, 'comfort')">Comfort</button>
      <button onclick="selectMood(this, 'healthy')">Healthy</button>
      <button onclick="selectMood(this, 'tired')">Low Energy</button>
      <button onclick="selectMood(this, 'exciting')">Something Different</button>
    </div>
  </div>

  <div class="card">
    <div class="section-title">Cooking energy?</div>

    <div class="button-group">
      <button onclick="selectEnergy(this, 'low')">Minimal</button>
      <button onclick="selectEnergy(this, 'medium')">Moderate</button>
      <button onclick="selectEnergy(this, 'high')">Can Cook Properly</button>
    </div>
  </div>

  <div class="card">
    <div class="section-title">Tomorrow lunch needed?</div>

    <div class="button-group">
      <button onclick="selectLunch(this, true)">Yes</button>
      <button onclick="selectLunch(this, false)">No</button>
    </div>
  </div>

  <div class="card">
    <div class="section-title">Any prep already done?</div>

    <div class="button-group">
      <button onclick="togglePrep(this, 'rice')">Rice Cooked</button>
      <button onclick="togglePrep(this, 'oats')">Oats Soaked</button>
      <button onclick="togglePrep(this, 'chila')">Chila Batter Ready</button>
    </div>
  </div>

  <button class="generate-btn" onclick="generateRecommendations()">
    🍛 Tell Me What We Should Eat
  </button>

  <div id="results"></div>

</div>

<div class="footer-left">
  Concept by BanRap
</div>

<div class="footer-right">
  Ver.1.0.0.15.05.2026.00.45.00
</div>

<script>

{

"Feels special and homemade"
]
}

];

function clearSelections(group) {
  group.forEach(btn => btn.classList.remove("selected"));
}

function selectUser(button, user) {
  clearSelections(document.querySelectorAll(".card:nth-child(3) button"));
  button.classList.add("selected");
  selectedUser = user;
}

function selectMood(button, mood) {
  clearSelections(document.querySelectorAll(".card:nth-child(4) button"));
  button.classList.add("selected");
  selectedMood = mood;
}

function selectEnergy(button, energy) {
  clearSelections(document.querySelectorAll(".card:nth-child(5) button"));
  button.classList.add("selected");
  selectedEnergy = energy;
}

function selectLunch(button, value) {
  clearSelections(document.querySelectorAll(".card:nth-child(6) button"));
  button.classList.add("selected");
  lunchNeeded = value;
}

function togglePrep(button, type) {
  prepState[type] = !prepState[type];

  if(prepState[type]) {
    button.classList.add("selected");
  } else {
    button.classList.remove("selected");
  }
}

function generateRecommendations() {

  const results = document.getElementById("results");
  results.innerHTML = "";

  const today = new Date().getDay();

  let scoredMeals = meals.map(meal => {

    let score = 0;

    if(selectedMood === "comfort") score += meal.comfort;
    if(selectedMood === "healthy") score += meal.healthy;

    if(selectedMood === "tired" && meal.energy === "low") score += 10;

    if(selectedEnergy === meal.energy) score += 8;

    if(lunchNeeded && meal.lunch) score += 10;

    if(meal.prep && prepState[meal.prep]) score += 12;

    if(today === 5 && !meal.lunch) score += 5;

    if(today === 0 && meal.lunch) score += 6;

    return {
      ...meal,
      score
    };

  });

  scoredMeals.sort((a,b) => b.score - a.score);

  const topMeals = scoredMeals.slice(0,3);

  topMeals.forEach((meal, index) => {

    const div = document.createElement("div");
    div.className = "recommendation";

    div.innerHTML = `
      <div class="meal-name">
        ${index === 0 ? "🥇" : index === 1 ? "🥈" : "🥉"} ${meal.name}
      </div>

      <div class="meal-reason">
        ${meal.reasons.map(r => `• ${r}`).join("<br>")}
      </div>
    `;

    results.appendChild(div);

  });

}

</script>

</body>
</html>
