<script>

/* ---------- ENTER APP ---------- */

function enterApp(user){

selectedUser=user;

localStorage.setItem("lastUser",user);

document.getElementById("activeUser").innerHTML=
"🍲 Tonight: " + user;

resetAll();

document.getElementById("landingPage")
.classList.remove("active");

document.getElementById("mainPage")
.classList.add("active");

}

/* ---------- GO BACK ---------- */

function goBack(){

resetAll();

document.getElementById("mainPage")
.classList.remove("active");

document.getElementById("landingPage")
.classList.add("active");

}

/* ---------- MOOD ---------- */

function selectMood(btn,mood){

document.querySelectorAll("#moodButtons button")
.forEach(b=>b.classList.remove("selected"));

btn.classList.add("selected");

selectedMood=mood;

}

/* ---------- ENERGY ---------- */

function selectEnergy(btn,energy){

document.querySelectorAll("#energyButtons button")
.forEach(b=>b.classList.remove("selected"));

btn.classList.add("selected");

selectedEnergy=energy;

}

/* ---------- LUNCH ---------- */

function selectLunch(btn,val){

document.querySelectorAll("#lunchButtons button")
.forEach(b=>b.classList.remove("selected"));

btn.classList.add("selected");

lunchNeeded=val;

}

/* ---------- SAVE MEAL ---------- */

function saveMeal(mealName){

let history=
JSON.parse(localStorage.getItem("mealHistory")||"[]");

const today=
new Date().toDateString();

const todayMeal=
history.find(m=>m.day===today);

if(todayMeal){

if(todayMeal.name===mealName){

alert(
"You already recorded this meal today 🍲"
);

return;

}

const replace=
confirm(
`You already recorded "${todayMeal.name}" today.\n\nReplace it with "${mealName}"?`
);

if(!replace) return;

history=
history.filter(m=>m.day!==today);

}

history.unshift({
name:mealName,
date:new Date().toLocaleString(),
day:today
});

history=history.slice(0,5);

localStorage.setItem(
"mealHistory",
JSON.stringify(history)
);

renderHistory();

alert(mealName+" saved 🍲");

}

</script>
