/* =============================================== */

const floatingQuotes=[

"Some nights deserve fried rice.",

"Comfort food is emotional planning.",

"Health vs comfort: round 483.",

"Balancing cravings and logistics.",

"Some evenings are Maggi evenings.",

"Paneer diplomacy in progress.",

"Tonight’s biggest question.",

"Leftovers are tomorrow’s problem."

];

/* =============================================== */
/* ADD THIS NEW FUNCTION */
/* =============================================== */

function rotateQuotes(){

const quote=document.getElementById("floatingQuote");

let index=0;

setInterval(()=>{

index=(index+1)%floatingQuotes.length;

quote.innerText=floatingQuotes[index];

},4000);

}

/* =============================================== */
/* REPLACE YOUR saveMeal FUNCTION */
/* =============================================== */

function saveMeal(mealName){

let history=
JSON.parse(localStorage.getItem("mealHistory")||"[]");

const today=
new Date().toDateString();

const todayMeal=
history.find(m=>m.day===today);

if(todayMeal){

if(todayMeal.name===mealName){

alert("You already recorded this meal today 🍲");

return;

}

const replace=
confirm(
`You already recorded "${todayMeal.name}" today.\n\nReplace it with "${mealName}"?`
);

if(!replace) return;

history=
history.filter(m=>m.day!==today);

}

history.unshift({
name:mealName,
date:new Date().toLocaleString(),
day:today
});

history=history.slice(0,5);

localStorage.setItem(
"mealHistory",
JSON.stringify(history)
);

renderHistory();

alert(mealName+" saved 🍲");

}

/* =============================================== */
/* ADD THIS INSIDE window.onload */
/* =============================================== */

rotateQuotes();

</script>
